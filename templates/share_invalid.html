<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Link Unavailable — Engineering Office Storage</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="share-page">
  <div class="share-page-card share-page-card-narrow">

    <div class="share-page-header">
      <div class="share-page-logo">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Municipal Engineering Office seal">
      </div>
      <div>
        <p class="share-page-org">Municipal Engineering Office</p>
        <p class="share-page-tagline">Engineering Office Storage</p>
      </div>
    </div>

    <div class="share-page-body">
      <div class="share-lock-icon" style="background:var(--danger-lt); color:var(--danger);">
        <i class="bi bi-link-45deg"></i>
      </div>
      <h1 class="share-file-name" style="font-size:18px;">This link is no longer available</h1>
      <p class="share-file-desc">
        The share link may have expired, been revoked by its owner, or never existed.
        Please contact the person who shared it with you for a new link.
      </p>
    </div>

    <div class="share-page-footer">
      <i class="bi bi-shield-check me-1"></i>Engineering Office Storage
    </div>

  </div>
</div>

</body>
</html>
